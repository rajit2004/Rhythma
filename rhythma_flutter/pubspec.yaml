name: rhythma
description: Rhythma - AI-powered multilingual women's health companion for India

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3+1
  http: ^1.2.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^13.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase / Firestore
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3

  # Encryption
  encrypt: ^5.0.3

  # Charts and visualization
  fl_chart: ^0.68.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Permissions
  permission_handler: ^12.0.3

  # Connectivity
  connectivity_plus: ^6.0.3

  # Lightweight settings
  shared_preferences: ^2.3.2

  # URL launcher
  url_launcher: ^6.3.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1

  # Email validation
  email_validator: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true

  assets:
#    - assets/images/
    - .env
